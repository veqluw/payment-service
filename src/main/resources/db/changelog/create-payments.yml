databaseChangeLog:
  - changeSet:
      id: create-payments-table
      author: postgres
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false

              - column:
                  name: payment_amount
                  type: NUMERIC(12,2)
                  constraints:
                    nullable: false

              - column:
                  name: timestamp
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            tableName: payments
            indexName: idx_payments_order_id
            columns:
              - column:
                  name: order_id

        - createIndex:
            tableName: payments
            indexName: idx_payments_user_id
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: payments
            indexName: idx_payments_status
            columns:
              - column:
                  name: status

        - createIndex:
            tableName: payments
            indexName: idx_payments_timestamp
            columns:
              - column:
                  name: timestamp